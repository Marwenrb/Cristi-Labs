<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cristi Labs — LinkedIn Profile Picture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 60px 20px;
    gap: 44px;
  }
  .label {
    color: #4a4540;
    font-size: 8px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .preview-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 64px;
  }
  .preview-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .size-tag {
    font-size: 8px;
    letter-spacing: 3px;
    color: #2e2b26;
    text-transform: uppercase;
  }
  .circle {
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 2px rgba(184,146,74,0.20), 0 20px 60px rgba(0,0,0,0.85);
  }

  /* LinkedIn mock */
  .li-mock {
    background: #1B1B1B;
    border: 1px solid #222;
    border-radius: 10px;
    width: 440px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.85);
  }
  .li-banner {
    width: 440px;
    height: 110px;
    background: linear-gradient(135deg, #080706 0%, #111008 60%, #0F0D09 100%);
    position: relative;
    overflow: hidden;
  }
  .li-banner-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.25;
  }
  .li-avatar-row {
    padding: 0 20px 16px;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-top: -44px;
    position: relative;
  }
  .li-avatar-border {
    border-radius: 50%;
    border: 3px solid #1B1B1B;
    flex-shrink: 0;
    box-shadow: 0 0 0 1.5px rgba(184,146,74,0.28);
    overflow: hidden;
  }
  .li-info { padding-bottom: 4px; }
  .li-name {
    color: #E4E0D8;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Arial Black', sans-serif;
    letter-spacing: 2px;
  }
  .li-title { color: #5A5248; font-size: 9px; letter-spacing: 3px; margin-top: 4px; }
  .li-loc   { color: #3A3530; font-size: 8px; letter-spacing: 2px; margin-top: 3px; }
  .li-divider { height: 1px; background: #222; margin: 0 20px; }
  .li-stats {
    display: flex;
    gap: 0;
    padding: 12px 20px 16px;
  }
  .li-stat { flex: 1; }
  .li-stat-n { color: #C09848; font-size: 13px; font-weight: 700; font-family: 'Arial Black', sans-serif; }
  .li-stat-l { color: #3A3530; font-size: 8px; letter-spacing: 2px; margin-top: 2px; }

  .note { color: #2e2a25; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; }
  button {
    font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: #B8924A; background: none;
    border: 1px solid rgba(184,146,74,0.28); padding: 10px 22px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: rgba(184,146,74,0.06); border-color: #B8924A; }
</style>
</head>
<body>

<div class="note">Upload 400 × 400 — LinkedIn displays at 200px on profile, 48px in feed</div>
<button onclick="dl()">↓ Download SVG (400 × 400)</button>

<script>
function dl() {
  const svg = document.getElementById('main-svg');
  const clone = svg.cloneNode(true);
  clone.setAttribute('width','400');
  clone.setAttribute('height','400');
  const blob = new Blob([new XMLSerializer().serializeToString(clone)],{type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cristi_labs_linkedin_profile.svg';
  a.click();
}
</script>

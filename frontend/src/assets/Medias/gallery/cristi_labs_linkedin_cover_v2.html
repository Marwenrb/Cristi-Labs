<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cristi Labs — LinkedIn Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 50px 20px;
    gap: 28px;
  }
  .label {
    color: #3d3830;
    font-size: 8px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .wrapper {
    width: 792px;
    height: 198px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.95), 0 0 0 1px rgba(184,146,74,0.14);
    overflow: hidden;
  }
  button {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B8924A;
    background: none;
    border: 1px solid rgba(184,146,74,0.28);
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: rgba(184,146,74,0.06); border-color: #B8924A; }
</style>
</head>
<body>

<div class="label">LinkedIn Cover Photo — 1584 × 396 px</div>

<div class="wrapper">
<svg id="cover" width="792" height="198" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E0C08"/>
      <stop offset="40%"  stop-color="#0A0906"/>
      <stop offset="100%" stop-color="#070604"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D878"/>
      <stop offset="28%"  stop-color="#D4A84E"/>
      <stop offset="62%"  stop-color="#A07C30"/>
      <stop offset="100%" stop-color="#5A3E12"/>
    </linearGradient>
    <linearGradient id="brass-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F0D070"/>
      <stop offset="50%"  stop-color="#C49840"/>
      <stop offset="100%" stop-color="#7A5C20"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F4F0E8"/>
      <stop offset="65%"  stop-color="#E0DBD0"/>
      <stop offset="100%" stop-color="#8A8070"/>
    </linearGradient>
    <radialGradient id="mark-glow" cx="15%" cy="50%" r="25%">
      <stop offset="0%"   stop-color="#C49840" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C49840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="45%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>
    <linearGradient id="fade-right" x1="72%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A0906" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0906" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="diag" width="70" height="70" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="70" stroke="#C49840" stroke-width="0.35" opacity="0.038"/>
    </pattern>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#C49840" opacity="0.08"/>
    </pattern>
    <clipPath id="clip"><rect width="1584" height="396"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- ── BACKGROUNDS ── -->
    <rect width="1584" height="396" fill="url(#bg)"/>
    <rect width="1584" height="396" fill="url(#diag)"/>
    <rect width="1584" height="396" fill="url(#dots)"/>
    <rect width="1584" height="396" fill="url(#mark-glow)"/>

    <!-- ── OUTER FRAME ── -->
    <rect x="20" y="20" width="1544" height="356"
      fill="none" stroke="#B8924A" stroke-width="0.7" opacity="0.15"/>

    <!-- ── CORNER BRACKETS ── -->
    <line x1="20"   y1="20"  x2="110"  y2="20"  stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="20"   y1="20"  x2="20"   y2="110" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="1564" y1="20"  x2="1474" y2="20"  stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="1564" y1="20"  x2="1564" y2="110" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="20"   y1="376" x2="110"  y2="376" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="20"   y1="376" x2="20"   y2="286" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="1564" y1="376" x2="1474" y2="376" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>
    <line x1="1564" y1="376" x2="1564" y2="286" stroke="#D4A85C" stroke-width="1.8" opacity="0.72"/>

    <!-- ── VERTICAL DIVIDER ── -->
    <line x1="500" y1="48" x2="500" y2="348" stroke="#B8924A" stroke-width="0.6" opacity="0.20"/>

    <!-- ══════════════════════════════
         LEFT ZONE — CL MARK
    ══════════════════════════════ -->
    <rect x="100" y="58" width="280" height="280"
      fill="none" stroke="url(#brass)" stroke-width="2.8"/>

    <!-- Square corner ticks -->
    <line x1="100" y1="58"  x2="134" y2="58"  stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="100" y1="58"  x2="100" y2="92"  stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="380" y1="58"  x2="346" y2="58"  stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="380" y1="58"  x2="380" y2="92"  stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="100" y1="338" x2="134" y2="338" stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="100" y1="338" x2="100" y2="304" stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="380" y1="338" x2="346" y2="338" stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>
    <line x1="380" y1="338" x2="380" y2="304" stroke="#D4A85C" stroke-width="1.4" opacity="0.50"/>

    <!-- Crosshairs -->
    <line x1="116" y1="198" x2="364" y2="198" stroke="#B8924A" stroke-width="1" opacity="0.26"/>
    <line x1="240" y1="74"  x2="240" y2="322" stroke="#B8924A" stroke-width="1" opacity="0.26"/>

    <!-- Rings -->
    <circle cx="240" cy="198" r="152" fill="none" stroke="#B8924A" stroke-width="0.6" opacity="0.11"/>
    <circle cx="240" cy="198" r="140" fill="none" stroke="#C49840"
      stroke-width="0.6" opacity="0.09" stroke-dasharray="3 24"/>
    <circle cx="240" cy="198" r="14"  fill="none" stroke="#B8924A" stroke-width="0.7" opacity="0.22"/>
    <circle cx="240" cy="198" r="4.5" fill="#C49840" opacity="0.52"/>

    <!-- CL monogram -->
    <text x="240" y="202"
      text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New', Courier, monospace"
      font-size="112" font-weight="700"
      fill="url(#brass)" letter-spacing="8">CL</text>

    <!-- ══════════════════════════════
         RIGHT ZONE — IDENTITY STACK
         Layout (top → bottom):
           y=54  — VENTURE STUDIO label
           y=78  — thin rule
           y=220 — CRISTI baseline  (font 138, cap≈100px, so top≈120)
           y=238 — thick rule
           y=276 — LABS LLC
           y=298 — thin rule
           y=330 — tagline
           y=356 — dot trail
    ══════════════════════════════ -->

    <!-- VENTURE STUDIO — top label, well clear of title -->
    <text x="552" y="54"
      font-family="'Courier New', Courier, monospace"
      font-size="15" font-weight="400"
      fill="#B8924A" letter-spacing="9" opacity="0.65">VENTURE STUDIO</text>

    <!-- Rule separating label from title -->
    <line x1="552" y1="70" x2="1420" y2="70"
      stroke="#B8924A" stroke-width="0.6" opacity="0.22"/>

    <!-- CRISTI — large but controlled so cap-height starts well below rule -->
    <!-- font-size 138 → cap height ≈ 96px → baseline at 220 means top ≈ 124 — clear of y=70 rule -->
    <text x="552" y="220"
      dominant-baseline="auto"
      font-family="'Arial Black', 'Impact', 'Haettenschweiler', sans-serif"
      font-size="138" font-weight="900"
      fill="url(#title-grad)"
      letter-spacing="10">CRISTI</text>

    <!-- Bold rule under CRISTI -->
    <line x1="552" y1="238" x2="1440" y2="238"
      stroke="#B8924A" stroke-width="0.9" opacity="0.35"/>

    <!-- LABS LLC -->
    <text x="554" y="276"
      font-family="'Courier New', Courier, monospace"
      font-size="28" font-weight="500"
      fill="url(#brass-h)"
      letter-spacing="20">LABS LLC</text>

    <!-- Thin rule -->
    <line x1="552" y1="298" x2="1380" y2="298"
      stroke="#B8924A" stroke-width="0.4" opacity="0.16"/>

    <!-- Tagline -->
    <text x="554" y="330"
      font-family="'Courier New', Courier, monospace"
      font-size="15" fill="#52473A" letter-spacing="5">WYOMING · EST. 2024 · Building from scratch.</text>

    <!-- Dot trail -->
    <circle cx="554" cy="358" r="2.5" fill="#B8924A" opacity="0.42"/>
    <circle cx="570" cy="358" r="2.5" fill="#B8924A" opacity="0.28"/>
    <circle cx="586" cy="358" r="2.5" fill="#B8924A" opacity="0.16"/>
    <circle cx="602" cy="358" r="2.5" fill="#B8924A" opacity="0.08"/>

    <!-- Stamp -->
    <text x="1540" y="366"
      text-anchor="end"
      font-family="'Courier New', Courier, monospace"
      font-size="10" fill="#2A2520" letter-spacing="2.5">CL·LI·2024</text>

    <!-- Overlays -->
    <rect width="1584" height="396" fill="url(#fade-right)"/>
    <rect width="1584" height="396" fill="url(#vignette)"/>

  </g>
</svg>
</div>

<div class="label">1584 × 396 — LinkedIn exact spec</div>
<button onclick="dl()">↓ Download SVG</button>

<script>
function dl() {
  const svg = document.getElementById('cover');
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', '1584');
  clone.setAttribute('height', '396');
  const blob = new Blob([new XMLSerializer().serializeToString(clone)], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cristi_labs_linkedin_cover_v2.svg';
  a.click();
}
</script>
</body>
</html>

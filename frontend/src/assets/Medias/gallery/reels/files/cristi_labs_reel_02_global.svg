<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="75%">
      <stop offset="0%"   stop-color="#131008"/>
      <stop offset="55%"  stop-color="#080705"/>
      <stop offset="100%" stop-color="#030202"/>
    </radialGradient>
    <radialGradient id="glow-top" cx="50%" cy="0%" r="55%">
      <stop offset="0%"   stop-color="#C49840" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#C49840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bot" cx="50%" cy="100%" r="45%">
      <stop offset="0%"   stop-color="#C49840" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#C49840" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D878"/>
      <stop offset="40%"  stop-color="#C49840"/>
      <stop offset="100%" stop-color="#5A3E12"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F0ECE4"/>
      <stop offset="100%" stop-color="#A89880"/>
    </linearGradient>
    <radialGradient id="globe-fill" cx="38%" cy="34%" r="60%">
      <stop offset="0%"   stop-color="#1E1608" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#060504" stop-opacity=".1"/>
    </radialGradient>
    <radialGradient id="vign" cx="50%" cy="50%" r="75%">
      <stop offset="40%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.80)"/>
    </radialGradient>
    <clipPath id="gc"><circle cx="540" cy="460" r="340"/></clipPath>
    <clipPath id="main"><rect width="1080" height="1920"/></clipPath>
  </defs>

  <g clip-path="url(#main)">
    <rect width="1080" height="1920" fill="url(#bg)"/>
    <rect width="1080" height="1920" fill="url(#glow-top)"/>
    <rect width="1080" height="1920" fill="url(#glow-bot)"/>

    <!-- Frame -->
    <rect x="32" y="32" width="1016" height="1856" fill="none" stroke="#B8924A" stroke-width="1" opacity=".14"/>
    <line x1="32"   y1="32"   x2="130"  y2="32"   stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="32"   x2="32"   y2="130"  stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="32"   x2="950"  y2="32"   stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="32"   x2="1048" y2="130"  stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="1888" x2="130"  y2="1888" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="1888" x2="32"   y2="1790" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="1888" x2="950"  y2="1888" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="1888" x2="1048" y2="1790" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>

    <!-- Globe -->
    <!-- Pulse rings -->
    <circle cx="540" cy="460" r="370" fill="none" stroke="#C49840" stroke-width=".7" opacity=".07"/>
    <circle cx="540" cy="460" r="400" fill="none" stroke="#C49840" stroke-width=".5" opacity=".04"/>

    <circle cx="540" cy="460" r="340" fill="url(#globe-fill)"/>

    <!-- Parallels -->
    <g clip-path="url(#gc)" stroke="#C49840" fill="none" opacity=".17">
      <ellipse cx="540" cy="460" rx="340" ry="18"/>
      <ellipse cx="540" cy="460" rx="340" ry="85"/>
      <ellipse cx="540" cy="460" rx="340" ry="170"/>
      <ellipse cx="540" cy="460" rx="340" ry="255"/>
      <ellipse cx="540" cy="460" rx="340" ry="320"/>
    </g>
    <!-- Meridians -->
    <g clip-path="url(#gc)" stroke="#C49840" fill="none" opacity=".17">
      <ellipse cx="540" cy="460" rx="18"  ry="340"/>
      <ellipse cx="540" cy="460" rx="85"  ry="340"/>
      <ellipse cx="540" cy="460" rx="170" ry="340"/>
      <ellipse cx="540" cy="460" rx="255" ry="340"/>
      <ellipse cx="540" cy="460" rx="320" ry="340"/>
    </g>
    <!-- Globe border -->
    <circle cx="540" cy="460" r="340" fill="none" stroke="#C49840" stroke-width="1.5" opacity=".28"/>

    <!-- Network connections -->
    <g clip-path="url(#gc)" stroke="#C49840" fill="none" stroke-width="1.2" opacity=".35">
      <line x1="540" y1="200" x2="718" y2="340"/>
      <line x1="718" y1="340" x2="768" y2="520"/>
      <line x1="540" y1="200" x2="370" y2="390"/>
      <line x1="370" y1="390" x2="400" y2="598"/>
      <line x1="400" y1="598" x2="598" y2="640"/>
      <line x1="598" y1="640" x2="768" y2="520"/>
      <line x1="370" y1="390" x2="718" y2="340"/>
      <line x1="280" y1="480" x2="370" y2="390"/>
      <line x1="280" y1="480" x2="400" y2="598"/>
      <line x1="648" y1="300" x2="768" y2="520"/>
    </g>

    <!-- Nodes -->
    <circle cx="540" cy="200" r="9"   fill="#F0D070" opacity=".92"/>
    <circle cx="540" cy="200" r="20"  fill="none" stroke="#F0D070" stroke-width="1" opacity=".25"/>
    <circle cx="718" cy="340" r="7"   fill="#C49840" opacity=".85"/>
    <circle cx="768" cy="520" r="10"  fill="#F0D070" opacity=".90"/>
    <circle cx="768" cy="520" r="22"  fill="none" stroke="#F0D070" stroke-width="1" opacity=".22"/>
    <circle cx="370" cy="390" r="6"   fill="#C49840" opacity=".78"/>
    <circle cx="400" cy="598" r="7.5" fill="#D4A84E" opacity=".78"/>
    <circle cx="598" cy="640" r="6"   fill="#C49840" opacity=".72"/>
    <circle cx="648" cy="300" r="5.5" fill="#D4A84E" opacity=".68"/>
    <circle cx="280" cy="480" r="7"   fill="#C49840" opacity=".70"/>

    <!-- CL ghost -->
    <text x="540" y="472" text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New',Courier,monospace" font-size="44" font-weight="700"
      fill="#C49840" letter-spacing="4" opacity=".12">CL</text>

    <!-- Content below globe -->
    <line x1="80" y1="860" x2="1000" y2="860" stroke="#B8924A" stroke-width=".7" opacity=".16"/>

    <text x="80" y="932" font-family="'Courier New',Courier,monospace"
      font-size="22" fill="#C49840" letter-spacing="9" opacity=".58">CROSS-BORDER COMMERCE</text>

    <text x="80" y="1080" font-family="Georgia,'Times New Roman',serif"
      font-size="130" font-weight="300" font-style="italic" fill="#D4A84E" letter-spacing="-2">Global</text>
    <text x="80" y="1200" font-family="Georgia,'Times New Roman',serif"
      font-size="130" font-weight="300" fill="url(#title)" letter-spacing="-2">reach,</text>
    <text x="80" y="1320" font-family="Georgia,'Times New Roman',serif"
      font-size="110" font-weight="300" fill="#A89880" letter-spacing="-1">local trust.</text>

    <line x1="80" y1="1370" x2="210" y2="1370" stroke="#C49840" stroke-width="1.2" opacity=".48"/>

    <text x="80" y="1428" font-family="Georgia,serif" font-size="36" fill="#625848" letter-spacing=".5">Digital infrastructure built</text>
    <text x="80" y="1476" font-family="Georgia,serif" font-size="36" fill="#625848" letter-spacing=".5">for borderless business.</text>

    <!-- Stats -->
    <line x1="80" y1="1570" x2="1000" y2="1570" stroke="#C49840" stroke-width=".7" opacity=".18"/>
    <text x="160"  y="1636" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="600" fill="#E8E0D0">∞</text>
    <text x="160"  y="1672" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="17" fill="#C49840" letter-spacing="3" opacity=".55">MARKETS</text>
    <line x1="370" y1="1580" x2="370" y2="1680" stroke="#C49840" stroke-width=".8" opacity=".18"/>
    <text x="540"  y="1636" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="600" fill="#E8E0D0">100%</text>
    <text x="540"  y="1672" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="17" fill="#C49840" letter-spacing="3" opacity=".55">DIGITAL</text>
    <line x1="710" y1="1580" x2="710" y2="1680" stroke="#C49840" stroke-width=".8" opacity=".18"/>
    <text x="880"  y="1636" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="600" fill="#E8E0D0">1</text>
    <text x="880"  y="1672" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="17" fill="#C49840" letter-spacing="3" opacity=".55">VISION</text>

    <text x="540" y="1848" text-anchor="middle" font-family="'Courier New',Courier,monospace"
      font-size="18" fill="#2A2418" letter-spacing="4">CL · GLOBAL COMMERCE · 02</text>

    <rect width="1080" height="1920" fill="url(#vign)"/>
  </g>
</svg>

<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="20%" cy="55%" r="72%">
      <stop offset="0%"   stop-color="#14100A"/>
      <stop offset="55%"  stop-color="#080705"/>
      <stop offset="100%" stop-color="#030202"/>
    </radialGradient>
    <radialGradient id="glow" cx="15%" cy="52%" r="55%">
      <stop offset="0%"   stop-color="#C49840" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#C49840" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D878"/>
      <stop offset="40%"  stop-color="#C49840"/>
      <stop offset="100%" stop-color="#5A3E12"/>
    </linearGradient>
    <linearGradient id="brass-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#E8C868"/>
      <stop offset="100%" stop-color="#7A5C20"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F0ECE4"/>
      <stop offset="100%" stop-color="#A89880"/>
    </linearGradient>
    <radialGradient id="vign" cx="50%" cy="50%" r="75%">
      <stop offset="38%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.82)"/>
    </radialGradient>
    <!-- Diagonal hatch -->
    <pattern id="diag" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="100" stroke="#C49840" stroke-width=".4" opacity=".035"/>
    </pattern>
    <clipPath id="main"><rect width="1080" height="1920"/></clipPath>
  </defs>

  <g clip-path="url(#main)">
    <rect width="1080" height="1920" fill="url(#bg)"/>
    <rect width="1080" height="1920" fill="url(#diag)"/>
    <rect width="1080" height="1920" fill="url(#glow)"/>

    <!-- Frame -->
    <rect x="32" y="32" width="1016" height="1856" fill="none" stroke="#B8924A" stroke-width="1" opacity=".14"/>
    <line x1="32"   y1="32"   x2="130"  y2="32"   stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="32"   x2="32"   y2="130"  stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="32"   x2="950"  y2="32"   stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="32"   x2="1048" y2="130"  stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="1888" x2="130"  y2="1888" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="32"   y1="1888" x2="32"   y2="1790" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="1888" x2="950"  y2="1888" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>
    <line x1="1048" y1="1888" x2="1048" y2="1790" stroke="#D4A85C" stroke-width="2.4" opacity=".68"/>

    <!-- Ghost number — huge, translucent -->
    <text x="60" y="620" font-family="Georgia,serif" font-size="580" font-weight="300"
      fill="#C49840" opacity=".04" letter-spacing="-20">03</text>

    <!-- Abstract mark — centered upper -->
    <!-- Outer square -->
    <rect x="240" y="120" width="600" height="600" fill="none" stroke="url(#brass)" stroke-width="3"/>
    <!-- Rotated inner square -->
    <rect x="540" y="220" width="424" height="424" fill="none" stroke="#C49840"
      stroke-width="1.2" opacity=".18" transform="rotate(45 540 420)"/>
    <!-- Diagonal X -->
    <line x1="240" y1="120" x2="840" y2="720" stroke="#C49840" stroke-width=".8" opacity=".20"/>
    <line x1="840" y1="120" x2="240" y2="720" stroke="#C49840" stroke-width=".8" opacity=".20"/>
    <!-- Crosshairs -->
    <line x1="240" y1="420" x2="840" y2="420" stroke="#C49840" stroke-width="1" opacity=".22"/>
    <line x1="540" y1="120" x2="540" y2="720" stroke="#C49840" stroke-width="1" opacity=".22"/>
    <!-- Corner ticks on square -->
    <line x1="240" y1="120" x2="295" y2="120" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="240" y1="120" x2="240" y2="175" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="840" y1="120" x2="785" y2="120" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="840" y1="120" x2="840" y2="175" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="240" y1="720" x2="295" y2="720" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="240" y1="720" x2="240" y2="665" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="840" y1="720" x2="785" y2="720" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <line x1="840" y1="720" x2="840" y2="665" stroke="#D4A85C" stroke-width="2" opacity=".48"/>
    <!-- Rings -->
    <circle cx="540" cy="420" r="260" fill="none" stroke="#C49840" stroke-width=".6" opacity=".10"/>
    <circle cx="540" cy="420" r="240" fill="none" stroke="#C49840" stroke-width=".5" stroke-dasharray="4 28" opacity=".08"/>
    <!-- Center -->
    <circle cx="540" cy="420" r="22" fill="none" stroke="#C49840" stroke-width=".8" opacity=".18"/>
    <circle cx="540" cy="420" r="7"  fill="#C49840" opacity=".50"/>
    <!-- CL -->
    <text x="540" y="428" text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New',Courier,monospace" font-size="160" font-weight="700"
      fill="url(#brass)" letter-spacing="12">CL</text>

    <!-- Vertical side label -->
    <text x="1020" y="960" text-anchor="middle"
      font-family="'Courier New',Courier,monospace" font-size="20"
      fill="#C49840" letter-spacing="6" opacity=".28"
      transform="rotate(90 1020 960)">INNOVATION · INTEGRITY · CRISTI LABS</text>

    <!-- Divider -->
    <line x1="80" y1="840" x2="1000" y2="840" stroke="#B8924A" stroke-width=".7" opacity=".16"/>

    <!-- Kicker -->
    <text x="80" y="912" font-family="'Courier New',Courier,monospace"
      font-size="22" fill="#C49840" letter-spacing="9" opacity=".58">INNOVATION &amp; INTEGRITY</text>
    <line x1="340" y1="912" x2="1000" y2="912" stroke="#C49840" stroke-width=".5" opacity=".22"/>

    <!-- Headline -->
    <text x="80" y="1060" font-family="Georgia,'Times New Roman',serif"
      font-size="130" font-weight="300" fill="url(#title)" letter-spacing="-2">Built to</text>
    <text x="80" y="1200" font-family="Georgia,'Times New Roman',serif"
      font-size="160" font-weight="300" font-style="italic" fill="#D4A84E" letter-spacing="-3">last.</text>
    <text x="80" y="1330" font-family="Georgia,'Times New Roman',serif"
      font-size="110" font-weight="300" fill="#A89880" letter-spacing="-1">Built right.</text>

    <!-- Rule -->
    <line x1="80" y1="1378" x2="210" y2="1378" stroke="#C49840" stroke-width="1.2" opacity=".48"/>

    <!-- Body -->
    <text x="80" y="1436" font-family="Georgia,serif" font-size="36" fill="#5E5448" letter-spacing=".5">A venture studio where</text>
    <text x="80" y="1484" font-family="Georgia,serif" font-size="36" fill="#5E5448" letter-spacing=".5">integrity is the architecture.</text>

    <!-- Bottom CL mark -->
    <rect x="80" y="1620" width="80" height="80" fill="none" stroke="#C49840" stroke-width="1.5" opacity=".48"/>
    <line x1="80"  y1="1660" x2="160" y2="1660" stroke="#C49840" stroke-width=".7" opacity=".22"/>
    <line x1="120" y1="1620" x2="120" y2="1700" stroke="#C49840" stroke-width=".7" opacity=".22"/>
    <text x="120" y="1664" text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New',Courier,monospace" font-size="24" font-weight="700"
      fill="url(#brass)" letter-spacing="1">CL</text>
    <text x="184" y="1644" font-family="'Courier New',Courier,monospace" font-size="20" fill="#4a3e2e" letter-spacing="3">Cristi Labs LLC</text>
    <text x="184" y="1670" font-family="'Courier New',Courier,monospace" font-size="18" fill="#382e20" letter-spacing="2">Wyoming · Est. 2024</text>

    <text x="540" y="1848" text-anchor="middle" font-family="'Courier New',Courier,monospace"
      font-size="18" fill="#2A2418" letter-spacing="4">CL · INNOVATION · 03</text>

    <rect width="1080" height="1920" fill="url(#vign)"/>
  </g>
</svg>

<svg width="170" height="170" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A0806"/>
      <stop offset="100%" stop-color="#0F0D09"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C070"/>
      <stop offset="45%"  stop-color="#C09848"/>
      <stop offset="100%" stop-color="#6A5022"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#C09848" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C09848" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="85" cy="85" r="85"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="170" height="170" fill="url(#bg)"/>
    <rect width="170" height="170" fill="url(#halo)"/>

    <!-- Subtle diagonal texture -->
    <line x1="0"   y1="170" x2="170" y2="0"   stroke="#B8924A" stroke-width="0.3" opacity="0.05"/>
    <line x1="-30" y1="170" x2="140" y2="0"   stroke="#B8924A" stroke-width="0.3" opacity="0.04"/>
    <line x1="30"  y1="170" x2="200" y2="0"   stroke="#B8924A" stroke-width="0.3" opacity="0.04"/>

    <!-- Outer ring -->
    <circle cx="85" cy="85" r="78" fill="none" stroke="#B8924A" stroke-width="0.7" opacity="0.22"/>
    <!-- Inner ring -->
    <circle cx="85" cy="85" r="68" fill="none" stroke="#B8924A" stroke-width="0.4" opacity="0.10"/>

    <!-- Corner bracket marks -->
    <line x1="30"  y1="28"  x2="46"  y2="28"  stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="30"  y1="28"  x2="30"  y2="44"  stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="140" y1="28"  x2="124" y2="28"  stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="140" y1="28"  x2="140" y2="44"  stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="30"  y1="142" x2="46"  y2="142" stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="30"  y1="142" x2="30"  y2="126" stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="140" y1="142" x2="124" y2="142" stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>
    <line x1="140" y1="142" x2="140" y2="126" stroke="#D4A85C" stroke-width="1.4" opacity="0.60"/>

    <!-- Square mark -->
    <rect x="43" y="43" width="84" height="84" fill="none" stroke="url(#brass)" stroke-width="1.8"/>

    <!-- Crosshairs -->
    <line x1="52" y1="85" x2="118" y2="85" stroke="#B8924A" stroke-width="0.8" opacity="0.32"/>
    <line x1="85" y1="52" x2="85"  y2="118" stroke="#B8924A" stroke-width="0.8" opacity="0.32"/>

    <!-- Center dot -->
    <circle cx="85" cy="85" r="2.5" fill="#B8924A" opacity="0.45"/>

    <!-- CL -->
    <text x="85" y="87"
      text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New', Courier, monospace"
      font-size="34" font-weight="700"
      fill="url(#brass)" letter-spacing="2">CL</text>
  </g>
</svg>

<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E0C08"/>
      <stop offset="40%"  stop-color="#0A0906"/>
      <stop offset="100%" stop-color="#070604"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D878"/>
      <stop offset="28%"  stop-color="#D4A84E"/>
      <stop offset="62%"  stop-color="#A07C30"/>
      <stop offset="100%" stop-color="#5A3E12"/>
    </linearGradient>
    <linearGradient id="brass-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F0D070"/>
      <stop offset="50%"  stop-color="#C49840"/>
      <stop offset="100%" stop-color="#7A5C20"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F4F0E8"/>
      <stop offset="65%"  stop-color="#E0DBD0"/>
      <stop offset="100%" stop-color="#8A8070"/>
    </linearGradient>
    <radialGradient id="mark-glow" cx="15%" cy="50%" r="25%">
      <stop offset="0%"   stop-color="#C49840" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C49840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="45%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>
    <linearGradient id="fade-right" x1="72%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0A0906" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0906" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="diag" width="70" height="70" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="70" stroke="#C49840" stroke-width="0.35" opacity="0.038"/>
    </pattern>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#C49840" opacity="0.08"/>
    </pattern>
    <clipPath id="clip"><rect width="1584" height="396"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

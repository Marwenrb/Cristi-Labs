<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="70%">
      <stop offset="0%"   stop-color="#161210"/>
      <stop offset="65%"  stop-color="#0D0B08"/>
      <stop offset="100%" stop-color="#070604"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F2D080"/>
      <stop offset="30%"  stop-color="#D4A84E"/>
      <stop offset="68%"  stop-color="#A07830"/>
      <stop offset="100%" stop-color="#5E4018"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#C49A46" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C49A46" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shine" cx="32%" cy="28%" r="45%">
      <stop offset="0%"   stop-color="#F2D080" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F2D080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="40%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.60)"/>
    </radialGradient>
    <!-- LinkedIn blue ring hint -->
    <linearGradient id="li-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A66C2" stop-opacity="0.40"/>
      <stop offset="50%"  stop-color="#0A66C2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A66C2" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="full"><circle cx="200" cy="200" r="200"/></clipPath>
    <clipPath id="inner"><circle cx="200" cy="200" r="185"/></clipPath>
  </defs>

  <g clip-path="url(#full)">

    <!-- LinkedIn blue outer ring -->
    <circle cx="200" cy="200" r="198" fill="none" stroke="url(#li-ring)" stroke-width="4"/>

    <g clip-path="url(#inner)">
      <!-- Background -->
      <rect width="400" height="400" fill="url(#bg)"/>
      <rect width="400" height="400" fill="url(#halo)"/>
      <rect width="400" height="400" fill="url(#shine)"/>

      <!-- Diagonal texture -->
      <line x1="0"   y1="400" x2="400" y2="0"   stroke="#B8924A" stroke-width="0.35" opacity="0.045"/>
      <line x1="-60" y1="400" x2="340" y2="0"   stroke="#B8924A" stroke-width="0.35" opacity="0.030"/>
      <line x1="60"  y1="400" x2="460" y2="0"   stroke="#B8924A" stroke-width="0.35" opacity="0.030"/>

      <!-- Concentric rings -->
      <circle cx="200" cy="200" r="170" fill="none" stroke="#B8924A" stroke-width="0.7" opacity="0.18"/>
      <circle cx="200" cy="200" r="162" fill="none" stroke="#C8A04A"
        stroke-width="0.7" opacity="0.14" stroke-dasharray="3 24"/>
      <circle cx="200" cy="200" r="154" fill="none" stroke="#B8924A" stroke-width="0.4" opacity="0.09"/>

      <!-- Corner brackets -->
      <line x1="62"  y1="58"  x2="86"  y2="58"  stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="62"  y1="58"  x2="62"  y2="82"  stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="338" y1="58"  x2="314" y2="58"  stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="338" y1="58"  x2="338" y2="82"  stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="62"  y1="342" x2="86"  y2="342" stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="62"  y1="342" x2="62"  y2="318" stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="338" y1="342" x2="314" y2="342" stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>
      <line x1="338" y1="342" x2="338" y2="318" stroke="#D4A85C" stroke-width="1.8" opacity="0.62"/>

      <!-- Square mark -->
      <rect x="96" y="96" width="208" height="208"
        fill="none" stroke="url(#brass)" stroke-width="2.2"/>

      <!-- Square inner corner ticks -->
      <line x1="96"  y1="96"  x2="120" y2="96"  stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="96"  y1="96"  x2="96"  y2="120" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="304" y1="96"  x2="280" y2="96"  stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="304" y1="96"  x2="304" y2="120" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="96"  y1="304" x2="120" y2="304" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="96"  y1="304" x2="96"  y2="280" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="304" y1="304" x2="280" y2="304" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>
      <line x1="304" y1="304" x2="304" y2="280" stroke="#D4A85C" stroke-width="1.2" opacity="0.38"/>

      <!-- Crosshairs -->
      <line x1="110" y1="200" x2="290" y2="200" stroke="#B8924A" stroke-width="0.9" opacity="0.26"/>
      <line x1="200" y1="110" x2="200" y2="290" stroke="#B8924A" stroke-width="0.9" opacity="0.26"/>

      <!-- Center micro ring + dot -->
      <circle cx="200" cy="200" r="13" fill="none" stroke="#B8924A" stroke-width="0.6" opacity="0.22"/>
      <circle cx="200" cy="200" r="4"  fill="#C49A46" opacity="0.48"/>

      <!-- CL -->
      <text x="200" y="204"
        text-anchor="middle" dominant-baseline="central"
        font-family="'Courier New', Courier, monospace"
        font-size="88" font-weight="700"
        fill="url(#brass)" letter-spacing="5">CL</text>

      <rect width="400" height="400" fill="url(#vignette)"/>
    </g>
  </g>
</svg>

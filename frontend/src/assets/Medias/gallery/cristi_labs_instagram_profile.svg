<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#121008"/>
      <stop offset="100%" stop-color="#080705"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EEC86E"/>
      <stop offset="42%"  stop-color="#C49A46"/>
      <stop offset="100%" stop-color="#6E5224"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="52%">
      <stop offset="0%"   stop-color="#C49A46" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C49A46" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="32%" r="40%">
      <stop offset="0%"   stop-color="#EEC86E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#EEC86E" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="160" cy="160" r="160"/></clipPath>
  </defs>

  <g clip-path="url(#circle)">
    <!-- Background -->
    <rect width="320" height="320" fill="url(#bg)"/>
    <rect width="320" height="320" fill="url(#halo)"/>
    <rect width="320" height="320" fill="url(#shine)"/>

    <!-- Radial tick marks -->
    <circle cx="160" cy="160" r="148" fill="none" stroke="#C49A46"
      stroke-width="0.5" opacity="0.14" stroke-dasharray="2 18"/>

    <!-- Concentric rings -->
    <circle cx="160" cy="160" r="142" fill="none" stroke="#B8924A" stroke-width="0.8" opacity="0.20"/>
    <circle cx="160" cy="160" r="128" fill="none" stroke="#B8924A" stroke-width="0.4" opacity="0.09"/>

    <!-- Corner brackets -->
    <line x1="54"  y1="50"  x2="76"  y2="50"  stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="54"  y1="50"  x2="54"  y2="72"  stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="266" y1="50"  x2="244" y2="50"  stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="266" y1="50"  x2="266" y2="72"  stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="54"  y1="270" x2="76"  y2="270" stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="54"  y1="270" x2="54"  y2="248" stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="266" y1="270" x2="244" y2="270" stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>
    <line x1="266" y1="270" x2="266" y2="248" stroke="#D4A85C" stroke-width="1.6" opacity="0.65"/>

    <!-- Square mark -->
    <rect x="78" y="78" width="164" height="164" fill="none" stroke="url(#brass)" stroke-width="2.2"/>

    <!-- Square inner corner ticks -->
    <line x1="78"  y1="78"  x2="100" y2="78"  stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="78"  y1="78"  x2="78"  y2="100" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="242" y1="78"  x2="220" y2="78"  stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="242" y1="78"  x2="242" y2="100" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="78"  y1="242" x2="100" y2="242" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="78"  y1="242" x2="78"  y2="220" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="242" y1="242" x2="220" y2="242" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>
    <line x1="242" y1="242" x2="242" y2="220" stroke="#D4A85C" stroke-width="1.2" opacity="0.40"/>

    <!-- Crosshairs -->
    <line x1="92"  y1="160" x2="228" y2="160" stroke="#B8924A" stroke-width="0.9" opacity="0.28"/>
    <line x1="160" y1="92"  x2="160" y2="228" stroke="#B8924A" stroke-width="0.9" opacity="0.28"/>

    <!-- Center dot + micro ring -->
    <circle cx="160" cy="160" r="9"   fill="none" stroke="#B8924A" stroke-width="0.5" opacity="0.18"/>
    <circle cx="160" cy="160" r="3.5" fill="#B8924A" opacity="0.42"/>

    <!-- CL -->
    <text x="160" y="164"
      text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New', Courier, monospace"
      font-size="68" font-weight="700"
      fill="url(#brass)" letter-spacing="4">CL</text>
  </g>
</svg>

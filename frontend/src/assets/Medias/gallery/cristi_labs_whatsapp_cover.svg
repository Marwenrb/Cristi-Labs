<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brass-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A85C"/>
      <stop offset="45%" stop-color="#B8924A"/>
      <stop offset="100%" stop-color="#7A5F2E"/>
    </linearGradient>
    <linearGradient id="brass-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A85C"/>
      <stop offset="50%" stop-color="#B8924A"/>
      <stop offset="100%" stop-color="#5A4520"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090807"/>
      <stop offset="55%" stop-color="#0B0B0B"/>
      <stop offset="100%" stop-color="#100E0A"/>
    </linearGradient>
    <radialGradient id="mark-glow" cx="22%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#B8924A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#B8924A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <clipPath id="main-clip"><rect width="1500" height="500"/></clipPath>
  </defs>

  <g clip-path="url(#main-clip)">
    <rect width="1500" height="500" fill="url(#bg-grad)"/>
    <rect width="1500" height="500" fill="url(#mark-glow)"/>

    <!-- Grid -->
    <line x1="375" y1="0" x2="375" y2="500" stroke="#B8924A" stroke-width="0.4" opacity="0.04"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#B8924A" stroke-width="0.4" opacity="0.04"/>
    <line x1="1125" y1="0" x2="1125" y2="500" stroke="#B8924A" stroke-width="0.4" opacity="0.04"/>
    <line x1="0" y1="250" x2="1500" y2="250" stroke="#B8924A" stroke-width="0.4" opacity="0.04"/>

    <!-- Outer frame -->
    <rect x="24" y="24" width="1452" height="452" fill="none" stroke="#B8924A" stroke-width="0.8" opacity="0.18"/>

    <!-- Corner brackets -->
    <line x1="24" y1="24" x2="100" y2="24" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="24" y1="24" x2="24" y2="100" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="1476" y1="24" x2="1400" y2="24" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="1476" y1="24" x2="1476" y2="100" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="24" y1="476" x2="100" y2="476" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="24" y1="476" x2="24" y2="400" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="1476" y1="476" x2="1400" y2="476" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>
    <line x1="1476" y1="476" x2="1476" y2="400" stroke="#D4A85C" stroke-width="1.5" opacity="0.7"/>

    <!-- Divider -->
    <line x1="580" y1="80" x2="580" y2="420" stroke="#B8924A" stroke-width="0.6" opacity="0.25"/>

    <!-- CL Mark -->
    <rect x="168" y="118" width="264" height="264" fill="none" stroke="url(#brass-d)" stroke-width="2.5"/>
    <line x1="188" y1="250" x2="412" y2="250" stroke="#B8924A" stroke-width="1.2" opacity="0.35"/>
    <line x1="300" y1="138" x2="300" y2="362" stroke="#B8924A" stroke-width="1.2" opacity="0.35"/>
    <circle cx="300" cy="250" r="4" fill="#B8924A" opacity="0.4"/>
    <text x="300" y="254" text-anchor="middle" dominant-baseline="central"
      font-family="'Courier New', Courier, monospace" font-size="88" font-weight="700"
      fill="url(#brass-d)" letter-spacing="6">CL</text>

    <!-- Mark corner ticks -->
    <line x1="168" y1="118" x2="200" y2="118" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="168" y1="118" x2="168" y2="150" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="432" y1="118" x2="400" y2="118" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="432" y1="118" x2="432" y2="150" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="168" y1="382" x2="200" y2="382" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="168" y1="382" x2="168" y2="350" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="432" y1="382" x2="400" y2="382" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>
    <line x1="432" y1="382" x2="432" y2="350" stroke="#D4A85C" stroke-width="1.5" opacity="0.5"/>

    <!-- Wordmark -->
    <text x="634" y="224" dominant-baseline="auto"
      font-family="'Arial Black', Impact, sans-serif" font-size="148" font-weight="900"
      fill="#EDEAE4" letter-spacing="12">CRISTI</text>
    <text x="638" y="278" dominant-baseline="auto"
      font-family="'Courier New', Courier, monospace" font-size="32" font-weight="500"
      fill="url(#brass-h)" letter-spacing="22">LABS LLC</text>
    <line x1="638" y1="298" x2="1420" y2="298" stroke="#B8924A" stroke-width="0.8" opacity="0.35"/>
    <text x="640" y="332" dominant-baseline="auto"
      font-family="'Courier New', Courier, monospace" font-size="16" font-weight="400"
      fill="#6B6355" letter-spacing="8">VENTURE STUDIO · WYOMING · EST. 2024</text>

    <circle cx="640" cy="370" r="2" fill="#B8924A" opacity="0.35"/>
    <circle cx="656" cy="370" r="2" fill="#B8924A" opacity="0.25"/>
    <circle cx="672" cy="370" r="2" fill="#B8924A" opacity="0.15"/>

    <text x="1420" y="460" text-anchor="end"
      font-family="'Courier New', Courier, monospace" font-size="11"
      fill="#3A3228" letter-spacing="3">CL·00·2024</text>

    <rect width="1500" height="500" fill="url(#vignette)"/>
  </g>
</svg>

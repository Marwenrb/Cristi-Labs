<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cristi Labs — Facebook Profile Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 60px 20px;
    gap: 32px;
  }
  .label {
    color: #6B6355;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Preview row — show all three sizes side by side */
  .preview-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
  }
  .preview-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .size-tag {
    font-size: 8px;
    letter-spacing: 3px;
    color: #4a4540;
    text-transform: uppercase;
  }

  /* Circular clip */
  .circle-mask {
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 1.5px rgba(184,146,74,0.25), 0 20px 60px rgba(0,0,0,0.8);
  }

  /* Facebook mock context */
  .fb-mock {
    background: #1c1e21;
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
    width: 480px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }
  .fb-cover-strip {
    width: 480px;
    height: 126px;
    background: linear-gradient(135deg, #080706 0%, #0F0D09 100%);
    position: relative;
    overflow: hidden;
  }
  .fb-avatar-zone {
    padding: 0 16px 16px;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    position: relative;
    margin-top: -38px;
  }
  .fb-name {
    color: #E4E0D8;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Arial Black', sans-serif;
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .fb-sub {
    color: #5A5248;
    font-size: 9px;
    letter-spacing: 3px;
    font-family: 'Courier New', monospace;
  }

  .note {
    color: #3a3530;
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }
  button {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #B8924A;
    background: none;
    border: 1px solid rgba(184,146,74,0.3);
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: rgba(184,146,74,0.07); border-color: #B8924A; }
</style>
</head>
<body>

<div class="label">Facebook Profile Photo — 170 × 170 px</div>

<!-- SIZE PREVIEWS -->

        <g clip-path="url(#c170)">

          <!-- Diagonal subtle texture lines -->

          <!-- Crosshairs -->

          <line x1="85"  y1="52" x2="85"  y2="118" stroke="#B8924A" stroke-width="0.8" opacity="0.32"/>

          <!-- Center dot -->

            text-anchor="middle" dominant-baseline="central"

    </div>

  </div>

<div class="note">Upload the 170 × 170 SVG — Facebook will crop to circle automatically</div>
<button onclick="downloadSVG()">↓ Download SVG (170 × 170)</button>

<script>
function downloadSVG() {
  // Grab first svg (the 170px version)
  const svg = document.querySelector('.circle-mask svg');
  const s = new XMLSerializer();
  const blob = new Blob([s.serializeToString(svg)], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cristi_labs_facebook_profile.svg';
  a.click();
}
</script>

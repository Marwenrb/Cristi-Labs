[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                  = "DENY"
    X-Content-Type-Options           = "nosniff"
    Referrer-Policy                  = "strict-origin-when-cross-origin"
    Strict-Transport-Security        = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy               = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), display-capture=(), interest-cohort=()"
    Cross-Origin-Opener-Policy       = "same-origin"
    Cross-Origin-Resource-Policy     = "same-origin"
    X-DNS-Prefetch-Control           = "off"
    Content-Security-Policy          = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src * data: blob:; connect-src 'self' https://api.web3forms.com; media-src 'self'; frame-ancestors 'none';"

# ── Hashed JS/CSS assets — immutable (1 year) ──
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SVG assets — immutable (content-hashed by Vite) ──
[[headers]]
  for = "/assets/svg/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Images — immutable (content-hashed by Vite) ──
[[headers]]
  for = "/assets/png/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/webp/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/avif/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/jpg/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Video — immutable with range request support ──
[[headers]]
  for = "/assets/mp4/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

# ── Self-hosted fonts — immutable, restricted CORS ──
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control              = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "https://cristilabs.net"

# ── HTML — short cache (must revalidate for SPA updates) ──
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── SPA fallback routing ──
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
